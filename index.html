<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>PET·CT Dose Pro</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root { --c: #0A84FF; --bg: #F2F2F7; --surface: #FFFFFF; --alt: #F9F9FB; --text: #1C1C1E; --text-soft: #3A3A3C; --muted: #8E8E93; --border: #E5E5EA; --bfocus: #D1D1D6; --success: #34C759; --danger: #FF3B30; --warning: #FF9500; --shadow-sm: 0 4px 14px rgba(0,0,0,0.03); --shadow-md: 0 10px 30px rgba(0,0,0,0.06); --radius: 20px; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; background: var(--bg); }
    .tbl { width: 100%; border-collapse: collapse; text-align: center; background: var(--surface); }
    .tbl th { background: var(--alt); padding: 10px; font-size: 12px; }
    .tbl td { padding: 10px; border-bottom: 1px solid var(--border); }
    .t-inp { width: 100%; background: transparent; border: 1px solid var(--border); padding: 5px; text-align: center; }
    .mono { font-family: monospace; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useMemo, useRef} = React;

// Funções Matemáticas
const getRelMin = (t, r) => {
    const [h1, m1] = t.split(':').map(Number);
    const [h2, m2] = r.split(':').map(Number);
    return (h1 * 60 + m1) - (h2 * 60 + m2);
};
const addMin = (t, d) => {
    const [h, m] = t.split(':').map(Number);
    const total = h * 60 + m + d;
    return `${String(Math.floor(total/60)%24).padStart(2,'0')}:${String(total%60).padStart(2,'0')}`;
};
const f1 = (v) => v != null ? v.toFixed(1) : "—";

function App() {
  const [cfg, setCfg] = useState({hCalib: "08:00", aCalib: "100", vCalib: "1"});
  const [lista, setLista] = useState([{id: 1, nome: "Paciente 1", peso: "70", hSim: "08:30", doseReal: ""}]);

  // Motor de cálculo que gera a dose automática (PROG) quando REAL é vazio
  const lc = useMemo(() => {
    return lista.map(p => ({
      ...p,
      doseAplicar: p.doseReal ? parseFloat(p.doseReal) : (parseFloat(p.peso) * 0.1) // Simulação de cálculo simples
    }));
  }, [lista]);

  const handleHCalibChange = (newVal) => {
    const oldVal = cfg.hCalib;
    const diff = getRelMin(newVal, oldVal);
    setCfg({...cfg, hCalib: newVal});
    setLista(lista.map(p => ({...p, hSim: addMin(p.hSim, diff)})));
  };

  return (
    <div className="scroll">
      <input type="time" value={cfg.hCalib} onChange={e => handleHCalibChange(e.target.value)} />
      <table className="tbl">
        <thead><tr><th>Nome</th><th>Hora</th><th>Prog</th><th>Real</th></tr></thead>
        <tbody>
          {lc.map(p => (
            <tr key={p.id}>
              <td><input className="t-inp" value={p.nome} onChange={e=>setLista(lista.map(x=>x.id===p.id?{...x, nome:e.target.value}:x))} /></td>
              <td><input className="t-inp" type="time" value={p.hSim} onChange={e=>setLista(lista.map(x=>x.id===p.id?{...x, hSim:e.target.value}:x))} /></td>
              <td>{f1(p.doseAplicar)}</td>
              <td><input className="t-inp" value={p.doseReal} onChange={e=>setLista(lista.map(x=>x.id===p.id?{...x, doseReal:e.target.value}:x))} /></td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
